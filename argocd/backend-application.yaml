apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: backend
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/fodpapnor/Devops-GitOps.git
    targetRevision: main
    path: applications/backend

  destination:
    server: https://kubernetes.default.svc
    namespace: applications

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true