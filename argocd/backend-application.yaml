apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: backend-app
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/fodpapnor/Devops-GitOps.git
    targetRevision: main
    path: applications/backend

  destination:
    server: https://kubernetes.default.svc
    namespace: applications

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true

  # production-grade diff handling
  ignoreDifferences:
    # Kubernetes restart annotation
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/template/metadata/annotations/kubectl.kubernetes.io~1restartedAt

    # Replica drift (autoscaling / manual scaling)
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas

    # Status (always cluster-generated)
    - group: apps
      kind: Deployment
      jqPathExpressions:
        - .status

    # Kubernetes default injected fields
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/template/spec/terminationGracePeriodSeconds