name: Validate GitOps

on:
  pull_request:
    branches:
      - feature/update
    paths:
      - "applications/**"
      - ".github/workflows/validate-gitops.yaml"

  push:
    branches:
      - feature/update
    paths:
      - "applications/**"
      - ".github/workflows/validate-gitops.yaml"

  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Helm + Kubeconform - ${{ matrix.release }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - release: backend-dev
            chart: applications/backend-chart
            values: applications/backend-chart/values-dev.yaml
            namespace: applications-dev

          - release: backend-prod
            chart: applications/backend-chart
            values: applications/backend-chart/values-prod.yaml
            namespace: applications-prod

          - release: frontend-dev
            chart: applications/frontend-chart
            values: applications/frontend-chart/values-dev.yaml
            namespace: applications-dev

    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4

      - name: Render Helm templates
        run: |
          mkdir -p rendered
          helm template "${{ matrix.release }}" "${{ matrix.chart }}" \
            --namespace "${{ matrix.namespace }}" \
            -f "${{ matrix.values }}" \
            > "rendered/${{ matrix.release }}.yaml"

      - name: Run kubeconform (JSON output)
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/rendered:/rendered \
            ghcr.io/yannh/kubeconform:latest \
            -output json \
            -ignore-missing-schemas \
            /rendered/${{ matrix.release }}.yaml \
            > kubeconform-${{ matrix.release }}.json

      - name: Upload validation report
        uses: actions/upload-artifact@v4
        with:
          name: kubeconform-${{ matrix.release }}
          path: kubeconform-${{ matrix.release }}.json


  summary:
    name: GitOps validation summary
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Check matrix result
        run: |
          echo "Checking validation results..."

          if [ "${{ needs.validate.result }}" != "success" ]; then
            echo "GitOps validation FAILED"
            exit 1
          fi

          echo "GitOps validation PASSED"