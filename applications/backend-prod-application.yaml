apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: backend-prod
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/fodpapnor/Devops-GitOps.git
    path: applications/backend-chart
    targetRevision: HEAD

    helm:
      valueFiles:
        - values-prod.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: applications-prod

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true