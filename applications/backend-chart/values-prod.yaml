replicaCount: 1

nameOverride: backend-prod

image:
  repository: fodpapnor99/backend-app
  tag: b16df7cb
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80
  targetPort: 8000

ingress:
  enabled: true
  className: traefik
  host: backend.prod.local
  path: /

probes:
  readiness:
    path: /health/ready
    initialDelaySeconds: 5
    periodSeconds: 10

  liveness:
    path: /health/live
    initialDelaySeconds: 10
    periodSeconds: 20
  
securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  allowPrivilegeEscalation: false

namespace: applications-prod
