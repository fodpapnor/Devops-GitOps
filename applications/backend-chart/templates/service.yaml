apiVersion: v1
kind: Service

metadata:
  name: {{ .Values.nameOverride }}-service
  namespace: {{ .Values.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "0"

spec:
  selector:
    app: {{ .Values.nameOverride }}

  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      name: http

  type: {{ .Values.service.type }}