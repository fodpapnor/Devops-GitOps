replicaCount: 1
nameOverride: frontend-dev
revisionHistoryLimit: 2
image:
  repository: fodpapnor99/frontend-app
  tag: "edcc07df"
  pullPolicy: Always
service:
  type: ClusterIP
  port: 80
  targetPort: 80
serviceAccount:
  create: true
  name: frontend-dev-sa
  automountServiceAccountToken: false
ingress:
  enabled: true
  className: traefik
  host: frontend.dev.local
  path: /
probes:
  readiness:
    path: /
    initialDelaySeconds: 5
    periodSeconds: 10
  liveness:
    path: /
    initialDelaySeconds: 10
    periodSeconds: 20
resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "500m"
    memory: "256Mi"
securityContext:
  runAsNonRoot: true
  runAsUser: 101
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
    - ALL
configMap:
  enabled: true
  data:
    APP_ENV: dev
    LOG_LEVEL: info
namespace: applications-dev
